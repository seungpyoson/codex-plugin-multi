sonar.projectKey=seungpyoson_codex-plugin-multi
sonar.organization=seungpyoson

# Keep Sonar's quality gate focused on shipped plugin/runtime code. Test files
# intentionally manipulate PATH, spawn mock binaries, and mirror provider smoke
# flows, which otherwise produce security-hotspot and duplication noise.
sonar.sources=plugins,scripts
sonar.tests=tests

# Claude/Gemini plugin files deliberately mirror each other in several places;
# tests also mirror provider flows. Local invariants enforce byte-identical
# copies where required, so CPD should not be the gate for those intentional
# mirrors.
sonar.cpd.exclusions=plugins/gemini/**,tests/**
