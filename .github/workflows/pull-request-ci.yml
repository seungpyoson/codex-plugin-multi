name: pull-request-ci

on:
  pull_request:
    branches: [main, "docs/**"]
  push:
    branches: [main, "docs/**", "feat/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run lint
      - run: npm run lint:self-test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Run unit tests
        env:
          CODEX_PLUGIN_SKIP_SMOKE: "1"
        run: npm test
      - name: Run coverage gate
        env:
          COVERAGE_ENFORCE_TARGET: "1"
        run: npm run test:coverage

  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [claude, gemini]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Run ${{ matrix.target }} smoke tests
        run: npm run smoke:${{ matrix.target }}
