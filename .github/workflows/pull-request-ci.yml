name: pull-request-ci

on:
  pull_request:
    branches: [main, "docs/**"]
  push:
    branches: [main, "docs/**", "feat/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - run: npm run lint
      - run: npm run lint:sync
      - run: npm run lint:self-test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history vs origin/main so the fixture-validity gate can be
          # scoped to fixtures the PR actually changed (avoids retroactive
          # blocking when a sanitization rule is tightened later).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Compute changed fixtures (PR + feature branches)
        if: github.ref != 'refs/heads/main'
        run: |
          git fetch --no-tags --no-recurse-submodules --depth=50 origin main || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || true)
          if [ -n "$BASE" ] && [ "$BASE" != "$(git rev-parse HEAD)" ]; then
            CHANGED=$(git diff --name-only "$BASE" HEAD -- 'tests/smoke/fixtures/' || true)
          else
            CHANGED=""
          fi
          {
            echo "SMOKE_FIXTURE_CHANGED<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Run tests under hostile git-hook env
        env:
          CODEX_PLUGIN_SKIP_SMOKE: "1"
          GIT_DIR: /tmp/hostile/.git
          GIT_WORK_TREE: /tmp/hostile
          GIT_INDEX_FILE: /tmp/hostile/index
        run: |
          printf '[init]\n\tdefaultBranch = injected-master\n' > "$RUNNER_TEMP/hostile-gitconfig"
          GIT_CONFIG_GLOBAL="$RUNNER_TEMP/hostile-gitconfig" node scripts/ci/run-tests.mjs
      - name: Run unit tests (full)
        env:
          CODEX_PLUGIN_SKIP_SMOKE: "1"
          CODEX_PLUGIN_FULL_TESTS: "1"
        run: npm test
      - name: Run coverage gate
        env:
          COVERAGE_ENFORCE_TARGET: "1"
          CODEX_PLUGIN_SKIP_SMOKE: "1"
          CODEX_PLUGIN_FULL_TESTS: "1"
        run: npm run test:coverage

  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [claude, gemini, kimi, grok, api-reviewers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Run ${{ matrix.target }} smoke tests
        run: npm run smoke:${{ matrix.target }}
