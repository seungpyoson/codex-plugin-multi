name: manual-review-gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  issues: read
  statuses: write

jobs:
  manual-review-gate:
    if: github.event_name == 'pull_request' || github.event.issue.pull_request || github.event.pull_request
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/ci/check-manual-review-gate.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_REVIEW_GATE_STATUS_CONTEXT: manual-review-gate
