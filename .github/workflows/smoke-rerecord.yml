name: smoke-rerecord

# Records a real provider response into a sanitized fixture pair under
# tests/smoke/fixtures/<plugin>/<scenario>.{response,provenance}.json,
# then opens a PR with the diff for human review.
#
# Triggered manually only — never on PR or push. Real provider quota and
# real credentials live in repo Secrets; this workflow surfaces both,
# which is why it must remain workflow_dispatch-only.
#
# Secrets required (add per-architecture, only the ones you'll use):
#   ANTHROPIC_API_KEY     for claude/* recipes (alternative: existing OAuth)
#   GROK_WEB_BASE_URL     for grok/* recipes (override of default localhost tunnel)
#   DEEPSEEK_API_KEY      for api-reviewers-deepseek/* recipes
#
# A run that doesn't have the required secret for the chosen recipe will
# fail loudly via the rerecord script's preflight check.

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin (run smoke:rerecord -- --list locally to see options)"
        required: true
        type: choice
        options:
          - claude
          - grok
          - api-reviewers-deepseek
      scenario:
        description: "Scenario name (e.g. happy-path-review, auth-failure)"
        required: true
        type: string
      open_pr:
        description: "Open a PR with the new fixture. If false, the workflow validates the recording and emits a step-summary diff but does NOT push the temp branch (avoids orphan branches accumulating on origin)."
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  rerecord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Configure git author
        run: |
          git config user.name "smoke-rerecord-bot"
          git config user.email "smoke-rerecord-bot@users.noreply.github.com"

      - name: Run smoke:rerecord
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_WEB_BASE_URL: ${{ secrets.GROK_WEB_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMOKE_RERECORD_RUN_REF: "github.actions: ${{ github.workflow }} run ${{ github.run_id }}"
          # Move user inputs out of the run-block template so bash never sees
          # them as code. Inputs.plugin is already constrained by `type: choice`
          # but inputs.scenario is free-form text — both go through env vars
          # and are referenced as quoted shell parameters only.
          PLUGIN: ${{ inputs.plugin }}
          SCENARIO: ${{ inputs.scenario }}
        run: |
          npm run smoke:rerecord -- --plugin "$PLUGIN" --scenario "$SCENARIO"

      - name: Run fixture-validity gate against the new fixture
        run: |
          # The fixture-validity unit test scans every committed fixture and
          # asserts sanitization invariants. If the new fixture leaked anything,
          # this test fails AND blocks the PR.
          node --test --test-reporter=spec tests/unit/fixture-validity.test.mjs tests/unit/fixture-sanitization.test.mjs

      - name: Detect fixture changes
        id: detect
        run: |
          if git status --porcelain tests/smoke/fixtures/ | grep -q '.'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Recorded changes:"
            git status --porcelain tests/smoke/fixtures/
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to fixtures (already up to date with provider response)."
          fi

      - name: Stage + commit fixture
        if: steps.detect.outputs.changed == 'true'
        env:
          BRANCH_NAME: smoke-rerecord/${{ inputs.plugin }}-${{ inputs.scenario }}-${{ github.run_id }}
          PLUGIN: ${{ inputs.plugin }}
          SCENARIO: ${{ inputs.scenario }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git checkout -b "$BRANCH_NAME"
          git add tests/smoke/fixtures/
          # Build the commit message in a temp file so user-controlled inputs
          # are never re-evaluated by bash inside command substitutions.
          {
            printf 'fixture: rerecord %s/%s\n\n' "$PLUGIN" "$SCENARIO"
            printf 'Triggered via workflow_dispatch run #%s.\n' "$RUN_ID"
            printf 'Sanitization invariants verified by tests/unit/fixture-validity.test.mjs.\n\n'
            printf 'Provenance:\n'
            cat "tests/smoke/fixtures/${PLUGIN}/${SCENARIO}.provenance.json" 2>/dev/null \
              || printf '(provenance file not found)\n'
          } > /tmp/smoke-rerecord-commit-msg.txt
          git commit -F /tmp/smoke-rerecord-commit-msg.txt
          # Surface the diff in the workflow step summary so a preview run
          # (open_pr=false) is still useful: the operator can inspect the
          # recorded change without an orphan branch on origin.
          {
            printf '## Fixture diff (%s/%s)\n\n' "$PLUGIN" "$SCENARIO"
            printf '```diff\n'
            git show HEAD --stat -- tests/smoke/fixtures/
            printf '\n'
            git show HEAD -- tests/smoke/fixtures/ | head -200
            printf '\n```\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push branch (only when opening a PR)
        if: steps.detect.outputs.changed == 'true' && inputs.open_pr == true
        env:
          BRANCH_NAME: smoke-rerecord/${{ inputs.plugin }}-${{ inputs.scenario }}-${{ github.run_id }}
        run: |
          git push origin "$BRANCH_NAME"

      - name: Open PR
        if: steps.detect.outputs.changed == 'true' && inputs.open_pr == true
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: smoke-rerecord/${{ inputs.plugin }}-${{ inputs.scenario }}-${{ github.run_id }}
          PLUGIN: ${{ inputs.plugin }}
          SCENARIO: ${{ inputs.scenario }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            printf 'Automated re-recording of `%s/%s`.\n\n' "$PLUGIN" "$SCENARIO"
            printf 'Triggered via [workflow run #%s](%s).\n\n' "$RUN_ID" "$RUN_URL"
            printf 'Sanitization invariants verified by `tests/unit/fixture-validity.test.mjs` before PR creation.\n\n'
            printf 'Reviewer: please verify the diff against the previous fixture and ensure no regressions in shape, no new credential surfaces, and that any change in the sanitized response reflects real provider behavior change rather than a sanitization bug.\n'
          } > /tmp/smoke-rerecord-pr-body.txt
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "fixture: rerecord ${PLUGIN}/${SCENARIO}" \
            --body-file /tmp/smoke-rerecord-pr-body.txt

      - name: Summary
        if: steps.detect.outputs.changed == 'false'
        run: |
          echo "Rerecord ran successfully but produced no fixture changes."
          echo "This means the recorded provider response was byte-identical to the existing fixture after sanitization."
