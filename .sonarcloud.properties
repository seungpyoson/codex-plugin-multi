# SonarCloud automatic analysis configuration.
#
# Keep the quality gate focused on shipped plugin/runtime code. Test files
# intentionally manipulate PATH, spawn mock binaries, and mirror provider smoke
# flows, which otherwise produce security-hotspot and duplication noise.
sonar.exclusions=tests

# Claude/Gemini plugin files deliberately mirror each other in several places;
# local invariants enforce byte-identical copies where required, so CPD should
# not gate those intentional mirrors.
sonar.cpd.exclusions=plugins/claude/scripts/claude-companion.mjs,plugins/gemini/scripts/gemini-companion.mjs,plugins/claude/scripts/lib/cancel-marker.mjs,plugins/gemini/scripts/lib/cancel-marker.mjs,plugins/claude/scripts/lib/identity.mjs,plugins/gemini/scripts/lib/identity.mjs,plugins/claude/scripts/lib/job-record.mjs,plugins/gemini/scripts/lib/job-record.mjs,plugins/claude/scripts/lib/state.mjs,plugins/gemini/scripts/lib/state.mjs,tests
