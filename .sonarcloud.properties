# SonarCloud automatic analysis configuration.
#
# Keep the quality gate focused on shipped plugin/runtime code. Test files
# intentionally manipulate PATH, spawn mock binaries, and mirror provider smoke
# flows, which otherwise produce security-hotspot and duplication noise.
sonar.sources=plugins,scripts
sonar.tests=tests
sonar.exclusions=tests/**,plugins/kimi/scripts/**

# Claude/Gemini/Kimi plugin files deliberately mirror each other in several places;
# local invariants enforce byte-identical copies where required, so CPD should
# not gate those intentional mirrors. The companion-common and review-prompt
# plugin files are generated packaging copies of scripts/lib/*.mjs because Codex
# installs each plugin as a self-contained root. The sync-* helpers are tiny,
# intentionally symmetric packaging scripts for those canonical helper copies.
sonar.cpd.exclusions=tests/**,scripts/ci/sync-auth-selection.mjs,scripts/ci/sync-provider-env.mjs,scripts/ci/sync-companion-common.mjs,scripts/ci/sync-external-review.mjs,plugins/claude/scripts/claude-companion.mjs,plugins/gemini/scripts/gemini-companion.mjs,plugins/kimi/scripts/kimi-companion.mjs,plugins/grok/scripts/grok-web-reviewer.mjs,plugins/grok/scripts/grok-sync-browser-session.mjs,scripts/lib/review-prompt.mjs,plugins/api-reviewers/scripts/lib/review-prompt.mjs,plugins/claude/scripts/lib/review-prompt.mjs,plugins/gemini/scripts/lib/review-prompt.mjs,plugins/grok/scripts/lib/review-prompt.mjs,plugins/kimi/scripts/lib/review-prompt.mjs,plugins/claude/scripts/lib/companion-common.mjs,plugins/gemini/scripts/lib/companion-common.mjs,plugins/kimi/scripts/lib/companion-common.mjs,plugins/claude/scripts/lib/external-review.mjs,plugins/gemini/scripts/lib/external-review.mjs,plugins/kimi/scripts/lib/external-review.mjs,plugins/api-reviewers/scripts/lib/external-review.mjs,plugins/grok/scripts/lib/external-review.mjs,scripts/lib/usage-limit.mjs,plugins/api-reviewers/scripts/lib/usage-limit.mjs,plugins/claude/scripts/lib/usage-limit.mjs,plugins/gemini/scripts/lib/usage-limit.mjs,plugins/grok/scripts/lib/usage-limit.mjs,plugins/kimi/scripts/lib/usage-limit.mjs,plugins/claude/scripts/lib/args.mjs,plugins/gemini/scripts/lib/args.mjs,plugins/kimi/scripts/lib/args.mjs,plugins/claude/scripts/lib/auth-selection.mjs,plugins/gemini/scripts/lib/auth-selection.mjs,plugins/claude/scripts/lib/cancel-marker.mjs,plugins/gemini/scripts/lib/cancel-marker.mjs,plugins/kimi/scripts/lib/cancel-marker.mjs,plugins/api-reviewers/scripts/lib/git-binary.mjs,plugins/claude/scripts/lib/git-binary.mjs,plugins/gemini/scripts/lib/git-binary.mjs,plugins/grok/scripts/lib/git-binary.mjs,plugins/kimi/scripts/lib/git-binary.mjs,plugins/api-reviewers/scripts/lib/git-env.mjs,plugins/claude/scripts/lib/git-env.mjs,plugins/gemini/scripts/lib/git-env.mjs,plugins/kimi/scripts/lib/git-env.mjs,plugins/grok/scrip